<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        .profile-box {
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .profile-image {
            border-radius: 50%;
            width: 200px;
            height: 200px;
            background-image: url('https://media.discordapp.net/attachments/1120865433566842960/1149677489396920340/a_4c97062a311b8fabf0eb67800d42f906.gif');
            background-size: cover;
            background-position: center;
            margin: 0 auto;
        }
        
        .discord-button {
            margin-top: 20px;
        }
        
        .discord-button img {
            width: 100px; 
            height: 50px; 
            background: none;
        }
    </style>
</head>
<body>
    <div class="profile-box">
        <div class="profile-image"></div>
        <h1>yau</h1>
        <p></p>
        <h2>Owner of discord.gg/fastly</h2>
    </div>
</body>
</html>
